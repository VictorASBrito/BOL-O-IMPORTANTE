{% extends "base.html" %}

{% block title %}
    Administração - {{ nome_site }}
{% endblock %}

{% block content %}
    <div class="login-page">
        <div class="login-card">
            <div class="login-icon">
                🔐
            </div>

            <span class="page-eyebrow">
                Área restrita
            </span>

            <h1>Administração</h1>

            <p>
                Entre para cadastrar jogos, gerenciar
                participantes e informar resultados.
            </p>

            <form
                method="POST"
                action="{{ url_for('auth.login_admin') }}"
            >
                <input
                    type="hidden"
                    name="csrf_token"
                    value="{{ csrf_token() }}"
                >

                <input
                    type="hidden"
                    name="next"
                    value="{{ proximo or '' }}"
                >

                <div class="mb-3">
                    <label
                        for="usuario"
                        class="form-label"
                    >
                        Usuário administrativo
                    </label>

                    <input
                        type="text"
                        id="usuario"
                        name="usuario"
                        class="form-control"
                        autocomplete="username"
                        autofocus
                        required
                    >
                </div>

                <div class="mb-4">
                    <label
                        for="senha"
                        class="form-label"
                    >
                        Senha
                    </label>

                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        class="form-control"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="btn btn-copa w-100"
                >
                    Entrar como administrador
                </button>
            </form>

            <a
                href="{{ url_for('auth.login_usuario') }}"
                class="login-back-link"
            >
                Sou participante
            </a>
        </div>
    </div>
{% endblock %}
